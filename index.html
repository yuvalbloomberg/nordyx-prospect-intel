<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nordyx Prospect Intelligence v4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--bg2:#f8f9ff;--bg3:#f1f2f6;--bd:#e5e7eb;--t:#111827;--t2:#6b7280;--t3:#9ca3af;--acc:#6366F1;--sb:#ecfdf5;--st:#065f46;--sbd:#a7f3d0;--wb:#fffbeb;--wt:#92400e;--wbd:#fde68a;--db:#fef2f2;--dt:#dc2626;--dbd:#fca5a5;--ib:#eff6ff;--it:#1e40af;--ibd:#bfdbfe;--r:8px;--rl:12px;}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f13;--bg2:#1a1a24;--bg3:#242430;--bd:#2e2e3e;--t:#f9fafb;--t2:#9ca3af;--t3:#6b7280;--acc:#818cf8;--sb:#064e3b;--st:#6ee7b7;--sbd:#065f46;--wb:#78350f;--wt:#fcd34d;--wbd:#92400e;--db:#7f1d1d;--dt:#fca5a5;--dbd:#991b1b;--ib:#1e3a5f;--it:#93c5fd;--ibd:#1e40af;}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg3);min-height:100vh;padding:20px 16px;font-size:14px}
#root{max-width:900px;margin:0 auto}
input{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg);color:var(--t);outline:none}
input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
button{font-family:inherit;cursor:pointer}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.card-hd{display:flex;align-items:center;gap:7px;padding:9px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.card-bd{padding:14px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.cg{background:var(--sb);color:var(--st);border:1px solid var(--sbd)}
.cy{background:var(--wb);color:var(--wt);border:1px solid var(--wbd)}
.cr{background:var(--db);color:var(--dt);border:1px solid var(--dbd)}
.cb{background:var(--ib);color:var(--it);border:1px solid var(--ibd)}
.cp{background:#f5f3ff;color:#5b21b6;border:1px solid #ede9fe}
.cn{background:var(--bg2);color:var(--t2);border:1px solid var(--bd)}
.pbar-w{height:4px;background:var(--bg2);border-radius:2px;margin-top:3px}
.pbar{height:4px;border-radius:2px}
.sl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.acl{width:3px;height:13px;border-radius:2px;flex-shrink:0}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r);padding:3px}
.tab{padding:5px 14px;border-radius:6px;border:none;font-size:12px;font-weight:500;background:transparent;color:var(--t2);cursor:pointer}
.tab.on{background:var(--bg);color:var(--t)}
.ox{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;background:var(--bg2);color:var(--t2);font-weight:600;border-bottom:1px solid var(--bd)}
td{padding:7px 10px;border-bottom:1px solid var(--bd);color:var(--t);vertical-align:middle}
ul{padding-left:16px}li{line-height:1.7;font-size:13px;color:var(--t2)}

@media print {
  .tabs, button, input { display: none !important; }
  .card { break-inside: avoid; }
  body { background: white; padding: 0; }
}

@media print{.tabs,button,input{display:none!important}.card{break-inside:avoid}body{background:white;padding:0}}
</style>
</head>

// ── UTILS ─────────────────────────────────────────────────────
function scan(s){
  var l=s.toLowerCase();
  return DB.filter(function(a){
    return a.p.some(function(p){
      return l.indexOf(p.toLowerCase())!==-1;
    });
  }).map(function(a){
    return {name:a.n,cat:a.cat,cov:a.c,feat:a.f||null,cost:a.cost};
  });
}

function fhtml(d){
  return fetch("https://api.allorigins.win/get?url="+encodeURIComponent("https://"+d),{signal:AbortSignal.timeout(8000)})
    .then(function(r){return r.json();})
    .then(function(j){return j.contents||"";})
    .catch(function(){return "";});
}

function calcFin(apps){
  var total=apps.reduce(function(s,a){return s+(a.cost||0);},0);
  var rep=apps.filter(function(a){return a.cov==="full";}).reduce(function(s,a){return s+(a.cost||0);},0)
    +apps.filter(function(a){return a.cov==="partial";}).reduce(function(s,a){return s+Math.round((a.cost||0)*0.5);},0);
  var fc=apps.filter(function(a){return a.cov==="full";}).length;
  var plan=fc>=6||rep>=80?"Pro":"Starter";
  var pp=plan==="Pro"?99:39;
  return{total:total,rep:rep,savings:Math.max(0,rep-pp),plan:plan,pp:pp,roi:pp>0?Math.round(Math.max(0,rep-pp)/pp*100)+"%":"-"};
}

function calcPain(apps){
  return{
    sprawl:apps.length>10?"High":apps.length>5?"Medium":"Low",
    multiExp:apps.filter(function(a){return a.cat==="Experiments";}).length>1,
    multiPer:apps.filter(function(a){return a.cat==="Personalization";}).length>1,
    scriptComp:apps.length>10?"High":apps.length>5?"Medium":"Low",
    maturity:apps.filter(function(a){return a.cat==="Subscription";}).length>0?"Mature":
             apps.filter(function(a){return a.cat==="Analytics";}).length>0?"Growing":"Early"
  };
}

function calcOpp(apps,f,ai,isPlus){
  var ss=f.total>400?25:f.total>200?18:f.total>100?12:5;
  var rp=f.total>0?f.rep/f.total:0;
  var rs=rp>0.6?25:rp>0.4?18:rp>0.2?12:5;
  var cs=apps.length>12?25:apps.length>8?18:apps.length>4?12:5;
  // Shopify Plus = harder to close as early adopter, lower pilot fit
  var ps=isPlus?5:ai>50?15:10;
  return{ss:ss,rs:rs,cs:cs,ps:ps,t:ss+rs+cs+ps};
}

function missingCats(apps){
  var seen=new Set(apps.map(function(a){return a.cat;}));
  return CATS.filter(function(c){return !seen.has(c);});
}

  function dlCSV(){
    if(!stores.length)return;
    var rows=[["Store","Domain","Country","Industry","Apps","Spend","Savings","Plan","Score","Priority","AI Score","Analyzed"]];
    stores.forEach(function(s){var f=calcFin(s.apps||[]);rows.push([s.store_name||s.domain,s.domain,s.country||"",s.industry||"",(s.apps||[]).length,"$"+f.total,"$"+f.savings,f.plan,s.overall_score||0,s.priority||"",s.ai_score||0,s.analyzed_at||""]);});
    var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="nordyx-pipeline.csv";a.click();
    setCsvM("✓ Downloaded");setTimeout(function(){setCsvM("");},3000);
  }

  function dlApps(){
    var rows=[["Store","App","Category","Coverage","Feature","Est Cost"]];
    stores.forEach(function(s){(s.apps||[]).forEach(function(a){rows.push([s.store_name||s.domain,a.name,a.cat,a.cov,a.feat||"",a.cost||0]);});});
    var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="nordyx-apps.csv";a.click();
  }

  function dlHubSpot(){
    var rows=[["First Name","Last Name","Company","Website","Amount","Nordyx Score","Priority","Plan","Notes"]];
    stores.forEach(function(s){var f=calcFin(s.apps||[]);rows.push(["","",s.store_name||s.domain,"https://"+s.domain,f.savings*12,s.overall_score||0,s.priority||"Medium",f.plan,"Apps: "+(s.apps||[]).length+", Savings: $"+f.savings+"/mo"]);});
    var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="nordyx-hubspot.csv";a.click();
  }

  function genExec(){
    if(!apiKey||!stores.length)return;
    setExecL(true);
    var totalSav=stores.reduce(function(s,x){return s+calcFin(x.apps||[]).savings;},0);
    var avgScore=Math.round(stores.reduce(function(s,x){return s+(x.overall_score||0);},0)/stores.length);
    var top3=[].concat(stores).sort(function(a,b){return (b.overall_score||0)-(a.overall_score||0);}).slice(0,3).map(function(s){return s.store_name||s.domain;}).join(", ");
    var appFreq={};stores.forEach(function(s){(s.apps||[]).forEach(function(a){if(!appFreq[a.name])appFreq[a.name]=0;appFreq[a.name]++;});});
    var topAppsStr=Object.entries(appFreq).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(x){return x[0];}).join(", ");
    var prompt=[
      "Write a 200-word investor-ready executive summary for Nordyx.",
      "Nordyx is a Shopify app that replaces 15 separate storefront apps (upsell widgets, countdown timers, exit intent popups, announcement bars, bundles, sticky cart, back-in-stock alerts, wishlist, and more) with one unified runtime.",
      "Nordyx also includes Nordyx Spy (competitive intelligence) and Nordyx Agentic (AI agent support for ChatGPT/Perplexity shoppers).",
      "Pipeline data: "+stores.length+" Shopify stores analyzed.",
      "Average opportunity score: "+avgScore+"/100.",
      "Total monthly savings opportunity across pipeline: $"+totalSav+"/mo.",
      "Projected ARR at 100 stores: $"+Math.round(totalSav/stores.length*100*12/1000)+"K.",
      "Top prospects by score: "+top3+".",
      "Most common apps detected: "+topAppsStr+".",
      "Focus on: (1) market validation from real store data, (2) ARR opportunity, (3) why one unified runtime beats point solutions.",
      "Do NOT mention energy, IoT, or any unrelated industry. This is strictly Shopify ecommerce."
    ].join(" ");
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,messages:[{role:"user",content:prompt}]})})
    .then(function(r){return r.json();}).then(function(d){setExec(d.content[0]&&d.content[0].text||"");}).catch(function(){}).finally(function(){setExecL(false);});
  }

  return html`<div>
    <div class="g2" style=${{marginBottom:"14px"}}>
      ${[
        ["Pipeline CSV","All stores summary",dlCSV,"#10b981",csvM||"Export CSV"],
        ["Apps CSV","Full app inventory",dlApps,"#6366F1","Export Apps"],
        ["HubSpot CSV","CRM-ready import",dlHubSpot,"#ff7a59","Export HubSpot"],
        ["PDF Report","Print-friendly view",function(){window.print();},"#8b5cf6","Print / PDF"],
      ].map(function(x){return html`
        <div class="card" style=${{marginBottom:0}}>
          <div class="card-bd">
            <div style=${{fontWeight:"600",color:"var(--t)",marginBottom:"3px"}}>${x[0]}</div>
            <div style=${{fontSize:"12px",color:"var(--t2)",marginBottom:"10px"}}>${x[1]}</div>
            <button onClick=${x[2]} style=${{background:x[3],color:"white",border:"none",borderRadius:"var(--r)",padding:"7px 14px",fontSize:"13px",fontWeight:"500",width:"100%"}}>${x[4]}</button>
          </div>
        </div>`;
      })}
    </div>
    <div class="card">
      <div class="card-bd">
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <div><div style=${{fontWeight:"600",color:"var(--t)",marginBottom:"2px"}}>AI Executive Summary</div><div style=${{fontSize:"12px",color:"var(--t2)"}}>Investor-ready pipeline summary</div></div>
          <button onClick=${genExec} disabled=${execL||!stores.length} style=${{background:"var(--acc)",color:"white",border:"none",borderRadius:"var(--r)",padding:"7px 14px",fontSize:"13px",fontWeight:"500"}}>
            ${execL?"Generating...":"✦ Generate"}
          </button>
        </div>
        ${exec?html`<div style=${{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:"var(--r)",padding:"14px"}}>
          <p style=${{fontSize:"13px",lineHeight:1.7,color:"var(--t)",whiteSpace:"pre-wrap"}}>${exec}</p>
          <button onClick=${function(){navigator.clipboard.writeText(exec);}} style=${{marginTop:"10px",background:"var(--bg3)",border:"1px solid var(--bd)",borderRadius:"var(--r)",padding:"5px 10px",fontSize:"12px"}}>Copy</button>
        </div>`:html`<p style=${{fontSize:"13px",color:"var(--t3)"}}>Generate from ${stores.length} analyzed store${stores.length!==1?"s":""}.</p>`}
      </div>
    </div>
  </div>`;
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  var tabS=useState("analyze"); var tab=tabS[0],setTab=tabS[1];
  var urlS=useState(""); var url=urlS[0],setUrl=urlS[1];
  var keyS=useState(function(){return localStorage.getItem("nx-k")||"";}); var key=keyS[0],setKey=keyS[1];
  var workerS=useState(function(){return localStorage.getItem("nx-w")||"";}); var workerUrl=workerS[0],setWorkerUrl=workerS[1];
  var showWS=useState(!localStorage.getItem("nx-w")); var showW=showWS[0],setShowW=showWS[1];
  var showKS=useState(!localStorage.getItem("nx-k")); var showK=showKS[0],setSK=showKS[1];
  var loadS=useState(false); var loading=loadS[0],setL=loadS[1];
  var stS=useState(""); var status=stS[0],setSt=stS[1];
  var resS=useState(null); var result=resS[0],setR=resS[1];
  var errS=useState(null); var err=errS[0],setE=errS[1];
  var storesS=useState([]);
  var stores=storesS[0],setS=storesS[1];
  var loadingState=useState(true); var storesLoading=loadingState[0],setStoresLoading=loadingState[1];
  var syncErrState=useState(null); var syncErr=syncErrState[0],setSyncErr=syncErrState[1];

  function saveKey(){localStorage.setItem("nx-k",key);setSK(false);}
  function saveWorker(){localStorage.setItem("nx-w",workerUrl);setShowW(false);loadStores();}
  function getWorker(){return (workerUrl||localStorage.getItem("nx-w")||"").replace(/\/$/,"");}
  function loadStores(){
    var w=getWorker();
    if(!w){setStoresLoading(false);return;}
    setStoresLoading(true);setSyncErr(null);
    fetch(w+"/stores").then(function(r){return r.json();})
    .then(function(d){setS(Array.isArray(d)?d:[]);})
    .catch(function(){setSyncErr("Could not connect to Worker. Check URL.");})
    .finally(function(){setStoresLoading(false);});
  }
  function saveStores(list){
    setS(list);
    // list is the full updated list — we just pushed/removed one item
    // handled by saveStore / delStore
  }
  function saveStore(store){
    var w=getWorker();
    if(!w){return;}
    fetch(w+"/stores",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(store)})
    .catch(function(e){setSyncErr("Save failed: "+e.message);});
  }
  function delStore(domain){
    var w=getWorker();
    if(!w){return;}
    fetch(w+"/stores/"+encodeURIComponent(domain),{method:"DELETE"})
    .catch(function(e){setSyncErr("Delete failed: "+e.message);});
  }

  useEffect(function(){loadStores();},[]);
  function analyze(){
    if(!key){setSK(true);setE("Enter your Anthropic API key first.");return;}
    var domain=url.replace(/https?:\/\//,"").replace(/\/$/,"").split("/")[0];
    if(!domain)return;
    setL(true);setE(null);setR(null);setSt("Fetching HTML...");
    fhtml(domain).then(function(raw){
      var scanned=raw?scan(raw):[];
      setSt(scanned.length+" apps found · enriching...");
      return fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:3500,system:SYS,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:"Domain: "+domain+"\nPre-scanned apps:\n"+JSON.stringify(scanned)+"\nResearch and return JSON."}]})
      }).then(function(r){
        if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||"API error "+r.status);});
        return r.json();
      }).then(function(data){
        setSt("Processing...");
        var txt=data.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
        var m=txt.match(/\{[\s\S]*\}/);
        if(!m)throw new Error("Could not parse response — try again.");
        var en=JSON.parse(m[0]);
        var allApps=scanned.slice();
        (en.additional_apps||[]).forEach(function(a){if(!allApps.find(function(x){return x.name.toLowerCase()===a.name.toLowerCase();}))allApps.push({name:a.name,cat:a.cat,cov:a.cov,feat:a.feat||null,cost:a.cost,p:[]});});
        var f=calcFin(allApps),op=calcOpp(allApps,f,en.ai_score||0,en.shopify_plus);
        var final=Object.assign({},en,{domain:domain,apps:allApps,overall_score:en.overall_score||op.t,analyzed_at:new Date().toISOString()});
        delete final.additional_apps;
        setR(final);
        var newList=[final].concat(stores.filter(function(s){return s.domain!==domain;}));
        setS(newList);
        saveStore(final);
      });
    }).catch(function(e){setE(e.message);}).then(function(){setL(false);setSt("");});
  }

  var TABS=[["analyze","Analyze"],["portfolio","Pipeline"+(stores.length?" ("+stores.length+")":"")],["intelligence","Intelligence"],["roadmap","Roadmap"],["export","Export"]];

  return html`<div>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",flexWrap:"wrap",gap:"10px"}}>
      <div style=${{display:"flex",alignItems:"center",gap:"8px"}}>
        <div style=${{width:"28px",height:"28px",background:"var(--acc)",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style=${{color:"white",fontSize:"14px",fontWeight:"700"}}>N</span>
        </div>
        <div>
          <div style=${{fontSize:"15px",fontWeight:"700",color:"var(--t)"}}>Nordyx Prospect Intelligence</div>
          <div style=${{fontSize:"11px",color:"var(--t3)"}}>v5 · ${stores.length} stores · ${workerUrl?"☁️ synced":"⚠️ local only"} · ${key?"API key set":"Set API key →"}</div>
        </div>
      </div>
      <div style=${{display:"flex",gap:"6px"}}>
        <button onClick=${function(){setShowW(!showW);}} style=${{padding:"6px 10px",borderRadius:"var(--r)",border:"1px solid "+(workerUrl?"var(--sbd)":"var(--dbd)"),background:workerUrl?"var(--sb)":"var(--db)",color:workerUrl?"var(--st)":"var(--dt)",fontSize:"12px",fontWeight:"500"}}>
          ${workerUrl?"☁️ Cloud":"⚠️ Connect cloud"}
        </button>
        <button onClick=${function(){setSK(!showK);}} style=${{padding:"6px 10px",borderRadius:"var(--r)",border:"1px solid "+(key?"var(--sbd)":"var(--dbd)"),background:key?"var(--sb)":"var(--db)",color:key?"var(--st)":"var(--dt)",fontSize:"12px",fontWeight:"500"}}>
          ${key?"🔑 Key set":"⚠️ API key"}
        </button>
      </div>
    </div>

    <div style=${{overflowX:"auto",marginBottom:"14px"}}>
      <div class="tabs" style=${{width:"max-content"}}>
        ${TABS.map(function(x){return html`<button class=${"tab"+(tab===x[0]?" on":"")} onClick=${function(){setTab(x[0]);}}>${x[1]}</button>`;
        })}
      </div>
    </div>

    ${showW?html`<div class="card" style=${{marginBottom:"14px",border:"2px solid var(--acc)"}}>
      <div class="card-bd">
        <p style=${{fontSize:"13px",fontWeight:"600",color:"var(--t)",marginBottom:"4px"}}>☁️ Connect to Cloud Storage</p>
        <p style=${{fontSize:"12px",color:"var(--t2)",marginBottom:"8px"}}>Enter your Cloudflare Worker URL. Data will sync across all devices.</p>
        <div style=${{display:"flex",gap:"8px"}}>
          <input value=${workerUrl} onInput=${function(e){setWorkerUrl(e.target.value);}} onKeyDown=${function(e){if(e.key==="Enter")saveWorker();}} placeholder="https://nordyx-intel.yuvalbloomberg.workers.dev"/>
          <button onClick=${saveWorker} style=${{padding:"0 16px",background:"var(--acc)",color:"white",border:"none",borderRadius:"var(--r)",fontSize:"13px",fontWeight:"600",whiteSpace:"nowrap"}}>Connect</button>
        </div>
      </div>
    </div>`:""}
    ${showK?html`<div class="card" style=${{marginBottom:"14px"}}>
      <div class="card-bd">
        <p style=${{fontSize:"12px",color:"var(--t2)",marginBottom:"8px"}}>🔒 Stored in your browser only. Sent only to api.anthropic.com.</p>
        <div style=${{display:"flex",gap:"8px"}}>
          <input type="password" value=${key} onInput=${function(e){setKey(e.target.value);}} onKeyDown=${function(e){if(e.key==="Enter")saveKey();}} placeholder="sk-ant-api03-..."/>
          <button onClick=${saveKey} style=${{padding:"0 16px",background:"var(--acc)",color:"white",border:"none",borderRadius:"var(--r)",fontSize:"13px",fontWeight:"600",whiteSpace:"nowrap"}}>Save</button>
        </div>
      </div>
    </div>`:""}
    ${storesLoading?html`<div style=${{textAlign:"center",padding:"20px",color:"var(--t3)",fontSize:"13px"}}>☁️ Loading from cloud...</div>`:""}
    ${syncErr?html`<div style=${{background:"var(--db)",border:"1px solid var(--dbd)",borderRadius:"var(--r)",padding:"10px 14px",fontSize:"12px",color:"var(--dt)",marginBottom:"10px"}}>${syncErr}</div>`:""}

    ${tab==="analyze"?html`<div>
      <div style=${{display:"flex",gap:"8px",marginBottom:"16px"}}>
        <input value=${url} onInput=${function(e){setUrl(e.target.value);}} onKeyDown=${function(e){if(e.key==="Enter"&&!loading)analyze();}} placeholder="https://meowmeowtweet.com"/>
        <button onClick=${analyze} disabled=${loading||!url}
          style=${{padding:"0 20px",background:loading?"var(--bg2)":"var(--acc)",color:loading?"var(--t2)":"white",border:loading?"1px solid var(--bd)":"none",borderRadius:"var(--r)",fontSize:"13px",fontWeight:"600",minHeight:"38px",whiteSpace:"nowrap",cursor:loading?"not-allowed":"pointer"}}>
          ${loading?html`<span class="spin">⟳</span>${" "+status}`:"Analyze →"}
        </button>
      </div>
      ${err?html`<div style=${{background:"var(--db)",border:"1px solid var(--dbd)",borderRadius:"var(--r)",padding:"10px 14px",fontSize:"13px",color:"var(--dt)",marginBottom:"14px"}}>⚠ ${err}</div>`:""}
      ${result?html`<${ProspectCard} data=${result} apiKey=${key}/>`:""}
    </div>`:""}
    ${tab==="portfolio"?html`<${Portfolio} stores=${stores} onSelect=${function(s){setR(s);setTab("analyze");}} onDel=${function(d){var newList=stores.filter(function(s){return s.domain!==d;});setS(newList);delStore(d);}}/>`:""}
    ${tab==="intelligence"?html`<${Intelligence} stores=${stores} apiKey=${key}/>`:""}
    ${tab==="roadmap"?html`<${Roadmap} stores=${stores} apiKey=${key}/>`:""}
    ${tab==="export"?html`<${Export} stores=${stores} apiKey=${key}/>`:""}
  </div>`;
}

render(html`<${App}/>`,document.getElementById("root"));
})();
</script>
</body>
</html>
